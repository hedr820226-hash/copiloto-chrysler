<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ApexDash - Copiloto Inteligente</title>
    <style>
        :root { --cyan: #00d4ff; --dark-bg: #050a0f; --panel-bg: rgba(10, 25, 40, 0.7); }
        body { background-color: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: grid; grid-template-columns: 320px 1fr 320px; gap: 20px; height: 100vh; box-sizing: border-box; }
        
        .header { grid-column: span 3; text-align: center; color: var(--cyan); font-size: 2em; letter-spacing: 5px; text-shadow: 0 0 10px var(--cyan); }
        .panel { background: var(--panel-bg); border: 1px solid var(--cyan); border-radius: 15px; padding: 20px; box-shadow: inset 0 0 10px rgba(0, 212, 255, 0.2); }
        
        /* Consola de Mando */
        #output { height: 300px; overflow-y: auto; border: 1px solid #333; padding: 15px; margin-bottom: 10px; font-family: monospace; color: var(--cyan); background: rgba(0,0,0,0.5); }
        input { width: 70%; padding: 12px; background: #000; border: 1px solid var(--cyan); color: white; border-radius: 5px; }
        .btn { padding: 10px 20px; background: transparent; border: 1px solid var(--cyan); color: var(--cyan); cursor: pointer; transition: 0.3s; }
        .btn:hover { background: var(--cyan); color: black; }
        
        /* Botón Micrófono */
        .mic-container { text-align: center; padding: 40px; }
        .btn-mic { width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle, var(--cyan), #005f73); border: none; cursor: pointer; box-shadow: 0 0 40px var(--cyan); }
    </style>
</head>
<body>
    <h1 class="header">APEXDASH COPILOT</h1>

    <div class="panel">
        <div style="color: #888;">CONTROL DE VOZ</div>
        <div class="mic-container">
            <button class="btn-mic" id="btn-mic"></button>
            <p>PULSA O HABLA "DASH"</p>
        </div>
    </div>

    <div class="panel">
        <div style="color: #888;">CONSOLA DE MANDO</div>
        <div id="output">Dash: Sistema en línea...</div>
        <div>
            <input type="text" id="user-input" placeholder="Escribe comando...">
            <button class="btn" onclick="enviarTexto()">ENVIAR</button>
        </div>
    </div>

    <div class="panel">
        <div style="color: #888;">MONITOREO EN TIEMPO REAL</div>
        <p>RPM: 850 RPM</p>
        <p>Velocidad: 0 km/h</p>
        <p>Temp: 90°C</p>
    </div>

    <script>
        const output = document.getElementById('output');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-MX';
        recognition.continuous = true;

        function decir(texto) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'es-MX';
            window.speechSynthesis.speak(msg);
        }

        async function procesar(texto) {
            output.innerHTML += `<br>> ${texto}`;
            try {
                const response = await fetch('/api/asistente', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({code: texto})
                });
                const data = await response.json();
                output.innerHTML += `<br>Dash: ${data.respuesta}`;
                decir(data.respuesta);
                output.scrollTop = output.scrollHeight;
            } catch(e) { decir("Error de conexión"); }
        }

        recognition.onresult = (e) => {
            const transcript = e.results[e.results.length-1][0].transcript.toLowerCase();
            if(transcript.includes('dash')) {
                procesar(transcript.split('dash')[1].trim());
            }
        };

        recognition.start();

        function enviarTexto() {
            const val = document.getElementById('user-input').value;
            if(val) procesar(val);
            document.getElementById('user-input').value = '';
        }
    </script>
</body>
</html>
