<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DASH Copiloto</title>

<style>
:root{
    --cyan:#00eaff;
    --bg:#02060a;
}

body{
    margin:0;
    font-family:'Segoe UI';
    background:var(--bg);
    color:white;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns: 280px 1fr 280px;
    gap:10px;
    padding:10px;
}

/* HEADER */
.header{
    grid-column: span 3;
    text-align:center;
    font-size:2em;
    color:var(--cyan);
    text-shadow:0 0 15px var(--cyan);
}

/* PANEL */
.panel{
    border:1px solid var(--cyan);
    border-radius:15px;
    padding:15px;
    background:rgba(0,30,60,0.5);
}

/* IMÁGENES */
.logo{
    width:100%;
    margin-bottom:10px;
}
.carro{
    width:100%;
    border-radius:10px;
}

/* CHAT */
#output{
    height:220px;
    overflow:auto;
    color:var(--cyan);
}

/* INPUT */
input{
    width:65%;
    padding:10px;
    background:black;
    border:1px solid var(--cyan);
    color:white;
}

button{
    padding:10px;
    background:var(--cyan);
    border:none;
    cursor:pointer;
}

/* MIC */
.mic{
    text-align:center;
    margin-top:10px;
}
.btn-mic{
    width:90px;
    height:90px;
    border-radius:50%;
    background:var(--cyan);
    box-shadow:0 0 30px var(--cyan);
}

/* ESTADO */
.estado{
    text-align:center;
    color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<div class="header">DASH - COPILOTO INTELIGENTE</div>

<!-- IZQUIERDA -->
<div class="panel">
<img src="/static/logo.png" class="logo">

<p>Di: "Dash"</p>
<p>Ej: Dash abre YouTube</p>

<div class="mic">
<button class="btn-mic" onclick="toggleMic()"></button>
<p id="estado">Mic apagado</p>
</div>
</div>

<!-- CENTRO -->
<div class="panel">

<img src="/static/carro.png" class="carro">

<div id="output">Sistema iniciando...</div>

<input id="input" placeholder="Escribe comando...">
<button onclick="enviar()">ENVIAR</button>

</div>

<!-- DERECHA -->
<div class="panel">
<h3>COMANDOS</h3>
<p>Dash abre YouTube</p>
<p>Dash abre Gmail</p>
<p>Dash abre Maps</p>
<p>Dash abre WhatsApp</p>
</div>

</div>

<script>
const output = document.getElementById("output");
const estado = document.getElementById("estado");

let escuchando = false;

/* RECONOCIMIENTO */
const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
rec.lang = 'es-MX';
rec.continuous = true;
rec.interimResults = false;

/* VOZ A TEXTO */
rec.onresult = e => {
    const transcript = e.results[e.resultIndex][0].transcript.toLowerCase().trim();

    console.log("Escuchado:", transcript);

    if (transcript.includes("dash")) {
        const cmd = transcript.replace("dash", "").trim();

        if (cmd) {
            msg("Entendido: " + cmd);
            procesar(cmd);
        } else {
            msg("Te escucho");
        }
    }
};

/* REINICIO AUTOMÁTICO */
rec.onend = () => {
    if (escuchando) rec.start();
};

/* ERROR */
rec.onerror = e => {
    console.log(e);
    estado.innerText = "Error micrófono";
};

/* VOZ */
function hablar(t){
    speechSynthesis.cancel();
    const m = new SpeechSynthesisUtterance(t);
    m.lang='es-MX';
    speechSynthesis.speak(m);
}

/* MENSAJE */
function msg(t){
    output.innerHTML += "<br><b>Dash:</b> " + t;
    hablar(t);
    output.scrollTop = output.scrollHeight;
}

/* API */
async function procesar(t){
    output.innerHTML += "<br>> " + t;

    const r = await fetch('/api/asistente',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({code:t})
    });

    const d = await r.json();

    try{
        const obj = JSON.parse(d.respuesta);
        if(obj.tipo==="accion"){
            window.open(obj.url);
            msg(obj.mensaje);
            return;
        }
    }catch{}

    msg(d.respuesta);
}

/* INPUT */
function enviar(){
    const val = document.getElementById("input").value;
    if(val) procesar(val);
    document.getElementById("input").value="";
}

/* BOTÓN MIC */
function toggleMic(){
    if(!escuchando){
        rec.start();
        estado.innerText="Escuchando...";
        msg("Micrófono activado");
        escuchando=true;
    }else{
        rec.stop();
        estado.innerText="Mic apagado";
        msg("Micrófono desactivado");
        escuchando=false;
    }
}

/* INICIO */
window.onload = ()=>{
    msg("Sistema iniciando...");
    setTimeout(()=>msg("Todo en orden."),2000);
    setTimeout(()=>msg("Dash lista."),3500);
};
</script>

</body>
</html>
