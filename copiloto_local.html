<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DASH Copiloto</title>

<style>
:root{
    --cyan:#00eaff;
    --bg:#02060a;
}

body{
    margin:0;
    font-family:'Segoe UI';
    background:var(--bg);
    color:white;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns: 300px 1fr 300px;
    gap:10px;
    padding:10px;
}

/* PANEL */
.panel{
    border:1px solid var(--cyan);
    border-radius:15px;
    padding:15px;
    background:rgba(0,30,60,0.5);
}

/* HEADER */
.header{
    grid-column: span 3;
    text-align:center;
    font-size:2em;
    color:var(--cyan);
    text-shadow:0 0 15px var(--cyan);
}

/* CARRO */
.car{
    width:100%;
    border-radius:10px;
}

/* CHAT */
#output{
    height:250px;
    overflow:auto;
    color:var(--cyan);
}

/* INPUT */
input{
    width:70%;
    padding:10px;
    background:black;
    border:1px solid var(--cyan);
    color:white;
}

button{
    padding:10px;
    background:var(--cyan);
    border:none;
}

/* MIC */
.mic{
    text-align:center;
    margin-top:10px;
}

.btn-mic{
    width:90px;
    height:90px;
    border-radius:50%;
    background:var(--cyan);
    box-shadow:0 0 30px var(--cyan);
}
</style>
</head>

<body>

<div class="container">

<div class="header">DASH - COPILOTO INTELIGENTE</div>

<!-- IZQUIERDA -->
<div class="panel">
<img src="logo_apexdash.svg" width="100">
<h3>DASH</h3>

<p>Di: "Dash"</p>
<p>Ej: Dash abre YouTube</p>

<div class="mic">
<button class="btn-mic" onclick="toggleMic()"></button>
<p id="estado">Mic apagado</p>
</div>
</div>

<!-- CENTRO -->
<div class="panel">

<img src="carro.png" class="car">

<div id="output">Iniciando sistema...</div>

<input id="input" placeholder="Escribe comando...">
<button onclick="enviar()">ENVIAR</button>

</div>

<!-- DERECHA -->
<div class="panel">
<h3>ESTADO</h3>
<p>Motor: Óptimo</p>
<p>Temp: 90°C</p>
<p>Voltaje: 14V</p>
</div>

</div>

<script>
const output = document.getElementById("output");
const estado = document.getElementById("estado");

let escuchando = false;

/* VOZ */
function hablar(t){
    speechSynthesis.cancel();
    const m = new SpeechSynthesisUtterance(t);
    m.lang='es-MX';
    speechSynthesis.speak(m);
}

/* MENSAJE */
function msg(t){
    output.innerHTML += "<br>Dash: "+t;
    hablar(t);
}

/* INICIO */
window.onload = ()=>{
    msg("Escaneando vehículo...");
    setTimeout(()=>msg("Todo en orden."),2000);
    setTimeout(()=>msg("Dash lista."),3000);
}

/* API */
async function procesar(t){
    output.innerHTML += "<br>> "+t;

    const r = await fetch('/api/asistente',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({code:t})
    });

    const d = await r.json();

    try{
        const obj = JSON.parse(d.respuesta);
        if(obj.tipo==="accion"){
            window.open(obj.url);
            msg(obj.mensaje);
            return;
        }
    }catch{}

    msg(d.respuesta);
}

/* INPUT */
function enviar(){
    const t = document.getElementById("input").value;
    if(t) procesar(t);
    document.getElementById("input").value="";
}

/* VOZ */
const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
rec.lang='es-MX';
rec.continuous=true;

rec.onresult = e=>{
    const t = e.results[e.results.length-1][0].transcript.toLowerCase();

    if(t.includes("dash")){
        const cmd = t.replace("dash","").trim();
        if(cmd){
            msg("Ejecutando...");
            procesar(cmd);
        }
    }
};

/* BOTON */
function toggleMic(){
    if(!escuchando){
        rec.start();
        estado.innerText="Escuchando...";
        escuchando=true;
    }else{
        rec.stop();
        estado.innerText="Mic apagado";
        escuchando=false;
    }
}
</script>

</body>
</html>
