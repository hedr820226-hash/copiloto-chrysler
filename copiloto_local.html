<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DASH Copiloto</title>

<style>
:root{
    --cyan:#00eaff;
    --bg:#02060a;
}

body{
    margin:0;
    font-family:'Segoe UI';
    background:var(--bg);
    color:white;
}

/* HEADER */
.header{
    text-align:center;
    font-size:2em;
    color:var(--cyan);
    padding:10px;
    text-shadow:0 0 15px var(--cyan);
}

/* LAYOUT */
.main{
    display:flex;
    height:80vh;
}

/* PANEL */
.panel{
    flex:1;
    margin:10px;
    padding:15px;
    border:1px solid var(--cyan);
    border-radius:15px;
    background:rgba(0,30,60,0.6);
}

/* CONSOLA */
#output{
    height:60%;
    overflow:auto;
    color:var(--cyan);
    font-size:1.2em;
}

/* INPUT */
.input-area{
    margin-top:10px;
}

input{
    width:70%;
    padding:10px;
    background:black;
    border:1px solid var(--cyan);
    color:white;
}

button{
    padding:10px;
    background:var(--cyan);
    border:none;
    cursor:pointer;
}

/* MIC */
.mic{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
}

.btn-mic{
    width:110px;
    height:110px;
    border-radius:50%;
    background:var(--cyan);
    box-shadow:0 0 40px var(--cyan);
    border:none;
}

/* ESTADO */
.estado{
    text-align:center;
    color:#aaa;
}
</style>
</head>

<body>

<div class="header">DASH - COPILOTO</div>

<div class="main">

<div class="panel">
<h3>CONTROL</h3>
<p>Di: <b>"Dash"</b> + comando</p>
<p>Ejemplo: Dash abre YouTube</p>
</div>

<div class="panel">
<h3>DASH</h3>

<div id="output">Sistema iniciando...</div>

<div class="input-area">
<input id="input" placeholder="Escribe comando...">
<button onclick="enviarTexto()">ENVIAR</button>
</div>

<div class="estado" id="estado">Micrófono apagado</div>
</div>

<div class="panel">
<h3>ESTADO VEHÍCULO</h3>
<p>Motor: Óptimo</p>
<p>Temp: 90°C</p>
<p>Voltaje: 14V</p>
</div>

</div>

<div class="mic">
<button class="btn-mic" onclick="toggleMic()"></button>
</div>

<script>
const output = document.getElementById("output");
const estado = document.getElementById("estado");

let escuchando = false;

/* VOZ */
function hablar(texto){
    speechSynthesis.cancel();
    const m = new SpeechSynthesisUtterance(texto);
    m.lang='es-MX';
    m.rate=0.95;
    m.pitch=0.9;
    speechSynthesis.speak(m);
}

/* MENSAJE */
function msg(t){
    output.innerHTML += "<br>Dash: "+t;
    hablar(t);
    output.scrollTop=output.scrollHeight;
}

/* INICIO */
window.onload = ()=>{
    msg("Escaneando vehículo...");
    setTimeout(()=>msg("Todo en orden."),2000);
    setTimeout(()=>msg("Dash lista. Di 'Dash' para activar."),3500);
}

/* API */
async function procesar(t){
    output.innerHTML += "<br>> "+t;

    try{
        const r = await fetch('/api/asistente',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({code:t})
        });

        const d = await r.json();

        try{
            const obj = JSON.parse(d.respuesta);
            if(obj.tipo==="accion"){
                window.open(obj.url);
                msg(obj.mensaje);
                return;
            }
        }catch{}

        msg(d.respuesta);

    }catch{
        msg("Error de conexión");
    }
}

/* INPUT */
function enviarTexto(){
    const t = document.getElementById("input").value;
    if(t) procesar(t);
    document.getElementById("input").value="";
}

/* VOZ REAL */
const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
rec.lang='es-MX';
rec.continuous=true;
rec.interimResults=false;

rec.onresult = (e)=>{
    const texto = e.results[e.results.length-1][0].transcript.toLowerCase();

    console.log("Escuchado:", texto);

    if(texto.includes("dash")){
        const comando = texto.replace("dash","").trim();

        if(comando){
            msg("Ejecutando...");
            procesar(comando);
        }else{
            msg("Te escucho");
        }
    }
};

rec.onerror = (e)=>{
    estado.innerText = "Error micrófono";
};

/* CONTROL MIC */
function toggleMic(){
    if(!escuchando){
        rec.start();
        estado.innerText = "Escuchando...";
        msg("Micrófono activado");
        escuchando = true;
    }else{
        rec.stop();
        estado.innerText = "Micrófono apagado";
        escuchando = false;
    }
}
</script>

</body>
</html>
