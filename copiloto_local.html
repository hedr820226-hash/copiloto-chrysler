<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DASH - Copiloto</title>

<style>
:root{
    --cyan:#00d4ff;
    --bg:#02060a;
}

body{
    margin:0;
    font-family:'Segoe UI';
    background:var(--bg);
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* HEADER */
.header{
    text-align:center;
    font-size:1.8em;
    color:var(--cyan);
    padding:10px;
    text-shadow:0 0 10px var(--cyan);
}

/* CONTENEDOR */
.main{
    display:flex;
    flex:1;
}

/* LADOS */
.panel{
    flex:1;
    margin:5px;
    padding:15px;
    border:1px solid var(--cyan);
    border-radius:10px;
    background:rgba(0,20,40,0.6);
}

/* CONSOLA */
#output{
    height:60%;
    overflow:auto;
    font-size:1.2em;
    color:var(--cyan);
}

/* INPUT */
.input-area{
    margin-top:10px;
}

input{
    width:70%;
    padding:10px;
    background:black;
    border:1px solid var(--cyan);
    color:white;
}

button{
    padding:10px;
    border:none;
    background:var(--cyan);
    color:black;
    cursor:pointer;
}

/* MIC */
.mic{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
}

.btn-mic{
    width:100px;
    height:100px;
    border-radius:50%;
    background:var(--cyan);
    box-shadow:0 0 30px var(--cyan);
}
</style>
</head>

<body>

<div class="header">DASH - COPILOTO INTELIGENTE</div>

<div class="main">

    <!-- PANEL IZQUIERDO -->
    <div class="panel">
        <h3>CONTROL DE VOZ</h3>
        <p>Di: <b>"Dash"</b> + comando</p>
        <p>Ejemplo: "Dash abre YouTube"</p>
    </div>

    <!-- PANEL CENTRAL -->
    <div class="panel">
        <h3>DASH</h3>

        <div id="output">Inicializando sistema...</div>

        <div class="input-area">
            <input id="input" placeholder="Escribe comando...">
            <button onclick="enviarTexto()">ENVIAR</button>
        </div>
    </div>

    <!-- PANEL DERECHO -->
    <div class="panel">
        <h3>MONITOREO</h3>
        <p>Motor: Óptimo</p>
        <p>Temp: 90°C</p>
        <p>Voltaje: 14V</p>
    </div>

</div>

<!-- MIC -->
<div class="mic">
    <button class="btn-mic" onclick="activarMicrofono()"></button>
</div>

<script>
const output = document.getElementById("output");

/* VOZ */
function hablar(t){
    speechSynthesis.cancel();
    const m = new SpeechSynthesisUtterance(t);
    m.lang='es-MX';
    speechSynthesis.speak(m);
}

/* MENSAJE */
function msg(t){
    output.innerHTML += "<br>Dash: "+t;
    hablar(t);
    output.scrollTop=output.scrollHeight;
}

/* INICIO */
window.onload = ()=>{
    msg("Escaneando sistema...");
    setTimeout(()=>msg("Todo en orden."),2000);
    setTimeout(()=>msg("Dash lista. Monitoreando."),3500);
}

/* API */
async function procesar(t){
    output.innerHTML += "<br>> "+t;

    try{
        const r = await fetch('/api/asistente',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({code:t})
        });

        const d = await r.json();

        try{
            const obj = JSON.parse(d.respuesta);
            if(obj.tipo==="accion"){
                window.open(obj.url);
                msg(obj.mensaje);
                return;
            }
        }catch{}

        msg(d.respuesta);

    }catch{
        msg("Error de conexión");
    }
}

/* INPUT */
function enviarTexto(){
    const t = document.getElementById("input").value;
    if(t) procesar(t);
    document.getElementById("input").value="";
}

/* VOZ */
const rec = new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.lang='es-MX';
rec.continuous=true;

rec.onresult = e=>{
    const t = e.results[e.results.length-1][0].transcript.toLowerCase();

    if(t.includes("dash")){
        const cmd = t.replace("dash","").trim();
        if(cmd) procesar(cmd);
    }
}

/* BOTON */
function activarMicrofono(){
    rec.start();
    msg("Escuchando...");
}
</script>

</body>
</html>
