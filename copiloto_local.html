<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexDash - Copiloto Inteligente</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-green: #39ff14;
            --bg-dark: #050a0f;
            --glass: rgba(10, 25, 40, 0.6);
            --border-glow: 0 0 10px rgba(0, 212, 255, 0.3);
        }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .dashboard-container { display: grid; grid-template-columns: 320px 1fr 320px; gap: 15px; width: 100%; max-width: 1600px; height: 90vh; }
        .panel { background: var(--glass); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 12px; padding: 20px; box-shadow: var(--border-glow); }
        .panel-header { font-size: 0.8em; color: #888; text-transform: uppercase; margin-bottom: 15px; }
        #output { background: rgba(0,0,0,0.3); border-left: 2px solid var(--neon-blue); padding: 10px; height: 200px; overflow-y: auto; color: #ccc; font-family: monospace; margin-bottom: 10px; }
        .btn-mic { width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, var(--neon-blue), #005f73); border: none; cursor: pointer; box-shadow: 0 0 20px var(--neon-blue); margin: 20px auto; display: block; }
        input[type="text"] { width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--neon-blue); color: var(--neon-blue); border-radius: 5px; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="panel">
            <div class="panel-header">CONTROL DE VOZ</div>
            <button class="btn-mic" id="btn-mic"></button>
            <p style="text-align: center;">PULSA O HABLA</p>
        </div>
        <div class="panel">
            <div class="panel-header">CONSOLA DE MANDO</div>
            <div id="output">Dash: Sistema en línea...</div>
            <input type="text" id="user-input" placeholder="Escribe comando...">
        </div>
        <div class="panel">
            <div class="panel-header">MONITOREO</div>
            <p>Sistema: ApexDash v1.0</p>
        </div>
    </div>

    <script>
        const output = document.getElementById('output');
        const btnMic = document.getElementById('btn-mic');
        
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-MX';
        recognition.continuous = true;

        function decir(texto) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'es-MX';
            window.speechSynthesis.speak(msg);
        }

        recognition.onstart = () => { btnMic.style.boxShadow = "0 0 40px var(--neon-green)"; };
        recognition.onend = () => { btnMic.style.boxShadow = "0 0 20px var(--neon-blue)"; recognition.start(); };

        recognition.onresult = (event) => {
            const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
            if (transcript.includes('dash')) {
                const comando = transcript.split('dash')[1].trim();
                if (comando) procesarComando(comando);
            }
        };

        async function procesarComando(texto) {
            output.innerHTML += `<br>> ${texto}`;
            try {
                const response = await fetch('/api/asistente', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: texto })
                });
                const data = await response.json();
                output.innerHTML += `<br>Dash: ${data.respuesta}`;
                decir(data.respuesta);
            } catch (e) {
                decir("Error de conexión.");
            }
        }

        recognition.start();
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') procesarComando(e.target.value);
        });
    </script>
</body>
</html>
