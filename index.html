<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexDash Pro - Copiloto</title>
    <style>
        :root { --accent: #3498db; --bg: #0d0d0d; --card: #1a1a1a; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 500px; margin-bottom: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .value { font-size: 2.5em; font-weight: bold; color: var(--accent); }
        #chat-container { width: 100%; max-width: 500px; background: var(--card); border-radius: 15px; border: 2px solid var(--accent); padding: 15px; box-sizing: border-box; }
        #chat-box { height: 250px; overflow-y: auto; font-size: 0.95em; margin-bottom: 15px; color: #eee; text-align: left; background: #000; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #000; color: white; outline: none; font-size: 16px; }
        .btn-send { background: var(--accent); border: none; padding: 10px 20px; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-voice { background: #2c3e50; color: white; border: none; padding: 15px; width: 100%; font-size: 1.1em; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1 style="color: var(--accent); margin-bottom: 5px;">ApexDash 🚗🤖</h1>
    <div class="grid">
        <div class="card"><small>RPM</small><div class="value">0</div></div>
        <div class="card"><small>KM/H</small><div class="value">0</div></div>
    </div>
    <div id="chat-container">
        <div id="chat-box"><strong>COPILOTO:</strong> Rogelio, sube este código y espera al check verde en GitHub.</div>
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Escribe al copiloto...">
            <button class="btn-send" onclick="enviarTexto()">➔</button>
        </div>
        <button class="btn-voice" onclick="iniciarVoz()">🎤 HABLAR POR VOZ</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('userInput');

        function hablar(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'es-MX';
            window.speechSynthesis.speak(u);
        }

        async function llamarGemini(texto) {
            let k = localStorage.getItem('gemini_key');
            if (!k) {
                k = prompt("Pega tu API KEY (AIza...):");
                if (k) { k = k.trim(); localStorage.setItem('gemini_key', k); }
                else return;
            }

            const msgDiv = document.createElement('div');
            msgDiv.innerHTML = `<strong>SISTEMA:</strong> Pensando...`;
            chatBox.appendChild(msgDiv);
            
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k}`;

            try {
                const r = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Eres el copiloto mecánico del Chrysler 96 de Rogelio. Breve: " + texto }] }] })
                });
                const d = await r.json();
                if (d.error) throw new Error(d.error.message);
                const respuesta = d.candidates[0].content.parts[0].text;
                msgDiv.innerHTML = `<strong>COPILOTO:</strong> ${respuesta}`;
                hablar(respuesta);
            } catch (e) {
                msgDiv.innerHTML = `<strong>SISTEMA:</strong> Error de conexión. Revisa la llave.`;
                localStorage.removeItem('gemini_key');
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function enviarTexto() {
            if (userInput.value.trim()) { 
                chatBox.innerHTML += `<div><strong>ROGELIO:</strong> ${userInput.value}</div>`; 
                llamarGemini(userInput.value); 
                userInput.value = ""; 
            }
        }

        function iniciarVoz() {
            const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Rec) return alert("Usa Chrome.");
            const rec = new Rec();
            rec.lang = 'es-MX';
            rec.onresult = (e) => { 
                const t = e.results[0][0].transcript; 
                chatBox.innerHTML += `<div><strong>ROGELIO:</strong> ${t}</div>`; 
                llamarGemini(t); 
            };
            rec.start();
        }
    </script>
</body>
</html>
