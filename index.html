<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexDash - Gemini Pro</title>
    <style>
        :root { --accent: #3498db; --bg: #0d0d0d; --card: #1a1a1a; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 500px; margin-bottom: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .value { font-size: 2.5em; font-weight: bold; color: var(--accent); }
        #chat-container { width: 100%; max-width: 500px; background: var(--card); border-radius: 15px; border: 2px solid var(--accent); padding: 15px; box-sizing: border-box; box-shadow: 0 0 20px rgba(52, 152, 219, 0.2); }
        #chat-box { height: 250px; overflow-y: auto; font-size: 0.95em; margin-bottom: 15px; color: #eee; text-align: left; background: #000; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #000; color: white; outline: none; font-size: 16px; }
        .btn-send { background: var(--accent); border: none; padding: 10px 20px; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-send:hover { background: #2980b9; }
        
        .btn-voice { background: #2c3e50; color: white; border: none; padding: 15px; width: 100%; font-size: 1.1em; border-radius: 10px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .listening { background: #e74c3c !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(0.98); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <h1 style="color: var(--accent); margin-bottom: 5px;">ApexDash 🚗🤖</h1>
    <p style="font-size: 0.85em; color: #888; margin-bottom: 20px;">Cerebro: Gemini 1.5 Flash</p>

    <div class="grid">
        <div class="card"><small>RPM</small><div class="value">0</div></div>
        <div class="card"><small>KM/H</small><div class="value">0</div></div>
    </div>

    <div id="chat-container">
        <div id="chat-box"><strong>COPILOTO:</strong> Rogelio, el sistema está listo. Escribe o presiona el micro para hablar.</div>
        
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Escribe al copiloto..." autocomplete="off">
            <button class="btn-send" onclick="enviarTexto()">➔</button>
        </div>

        <button class="btn-voice" id="btnVoz" onclick="iniciarVoz()">🎤 HABLAR POR VOZ</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('userInput');

        function hablar(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'es-MX';
            u.rate = 1.0;
            window.speechSynthesis.speak(u);
        }

        function msg(q, t) {
            chatBox.innerHTML += `<div style="margin-top:10px;"><strong>${q}:</strong> ${t}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function llamarGemini(texto) {
            let k = localStorage.getItem('gemini_key');
            if (!k) {
                k = prompt("Pega tu API KEY de Google (Gemini):");
                if (k) {
                    k = k.trim();
                    localStorage.setItem('gemini_key', k);
                } else return;
            }

            msg("SISTEMA", "Pensando...");
            
            // URL Estable de Gemini 1.5 Flash para evitar el error 404
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k}`;

            try {
                const r = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Eres el copiloto del Chrysler 96 de Rogelio. Sé mecánico experto y breve. Pregunta: " + texto }] }]
                    })
                });
                
                const d = await r.json();
                
                if (d.error) throw new Error(d.error.message);

                const respuesta = d.candidates[0].content.parts[0].text;
                
                // Quitar el mensaje de "Pensando..."
                const systemMsgs = chatBox.querySelectorAll('div');
                systemMsgs[systemMsgs.length - 1].remove();

                msg("COPILOTO", respuesta);
                hablar(respuesta);
            } catch (e) {
                console.error(e);
                msg("SISTEMA", "Error de conexión. Verifica tu llave.");
                localStorage.removeItem('gemini_key'); // Borrar llave si falla para pedirla de nuevo
            }
        }

        function enviarTexto() {
            const t = userInput.value.trim();
            if (t) {
                msg("ROGELIO", t);
                llamarGemini(t);
                userInput.value = "";
            }
        }

        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") enviarTexto();
        });

        function iniciarVoz() {
            const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Rec) return alert("Tu navegador no soporta voz. Usa Google Chrome.");
            
            const rec = new Rec();
            rec.lang = 'es-MX';
            
            rec.onstart = () => { 
                document.getElementById('btnVoz').classList.add('listening');
                document.getElementById('btnVoz').innerHTML = "🛑 ESCUCHANDO...";
            };

            rec.onresult = (e) => {
                const t = e.results[0][0].transcript;
                msg("ROGELIO", t);
                llamarGemini(t);
            };

            rec.onend = () => {
                document.getElementById('btnVoz').classList.remove('listening');
                document.getElementById('btnVoz').innerHTML = "🎤 HABLAR POR VOZ";
            };

            rec.onerror = (e) => {
                console.error(e);
                document.getElementById('btnVoz').classList.remove('listening');
            };

            rec.start();
        }
    </script>
</body>
</html>
