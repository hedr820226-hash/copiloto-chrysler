<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copiloto Rogelio Pro</title>
    <style>
        :root { --accent: #e67e22; --bg: #121212; --card: #1e1e1e; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 500px; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .full { grid-column: span 2; }
        .value { font-size: 2em; font-weight: bold; color: var(--accent); display: block; }
        button { background: var(--accent); border: none; padding: 15px; color: white; border-radius: 30px; font-weight: bold; width: 100%; cursor: pointer; }
        input { width: 70%; padding: 12px; border-radius: 20px; border: 1px solid #444; background: #000; color: white; outline: none; }
        #log { width: 100%; max-width: 500px; font-family: monospace; font-size: 0.7em; color: #555; margin-top: 15px; height: 50px; overflow-y: auto; background: #000; padding: 10px; border-radius: 10px; }
        .listening { color: #2ecc71; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <h1>Copiloto Rogelio 🚗🤖</h1>
    <div id="status" style="margin-bottom:10px; font-size:0.8em; color:#2ecc71;">Sistemas en espera...</div>

    <div class="grid">
        <div class="card full">
            <button id="btnConectar">1. CONECTAR Y ACTIVAR VOZ</button>
        </div>

        <div class="card">
            <small>RPM</small>
            <span id="rpm" class="value">0</span>
        </div>

        <div class="card">
            <small>KM/H</small>
            <span id="kmh" class="value">0</span>
        </div>

        <div class="card full">
            <div id="micStatus">🎤 Micrófono apagado</div>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <input type="text" id="userInput" placeholder="Escribe o espera a ser escuchado...">
                <button id="sendBtn" style="width: 25%;">➔</button>
            </div>
        </div>

        <div class="card full">
            <small>ESTADO DEL SISTEMA</small>
            <div id="climaText" style="font-style: italic; font-size: 0.9em;">Esperando conexión OBD2...</div>
        </div>
    </div>

    <div id="log">Logs...</div>

    <script>
        // === CONFIGURACIÓN SEGURA ===
        const GROQ_KEY_MANUAL = ""; // Déjala vacía, el código te la pedirá en el cel.
        const PALABRA_ACTIVACION = "copiloto"; 

        let scannerChar;
        const logDiv = document.getElementById('log');
        function logger(m) { logDiv.innerHTML += `<div>> ${m}</div>`; logDiv.scrollTop = logDiv.scrollHeight; }

        function hablar(texto) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'es-MX';
            window.speechSynthesis.speak(msg);
        }

        // --- RECONOCIMIENTO DE VOZ ---
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-MX';
        recognition.continuous = true;
        recognition.interimResults = false;

        recognition.onstart = () => {
            document.getElementById('micStatus').innerHTML = "<span class='listening'>🎤 ESCUCHANDO (Dí 'Copiloto')</span>";
        };

        recognition.onresult = async (event) => {
            const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
            logger("Escuchado: " + transcript);

            if (transcript.includes(PALABRA_ACTIVACION)) {
                const comando = transcript.replace(PALABRA_ACTIVACION, "").trim();
                if (comando.length > 2) {
                    procesarAccion(comando);
                } else {
                    hablar("¿Dime Rogelio, qué necesitas para el Chrysler?");
                }
            }
        };

        recognition.onend = () => { try { recognition.start(); } catch(e) {} };

        // --- INTELIGENCIA (CON MEMORIA DE LLAVE) ---
        async function procesarAccion(texto) {
            let llaveActual = localStorage.getItem('groq_key_rogelio');
            
            if (!llaveActual) {
                llaveActual = prompt("GitHub bloqueó tu llave anterior. Por favor pega tu API Key de Groq aquí para guardarla en el celular:");
                if (llaveActual) localStorage.setItem('groq_key_rogelio', llaveActual);
            }

            logger("Procesando con IA...");
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${llaveActual}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "system", content: "Eres el copiloto del Chrysler 1996 de Rogelio. Responde muy breve, máximo 15 palabras." },
                                   { role: "user", content: texto }]
                    })
                });
                const data = await res.json();
                if (data.choices) {
                    hablar(data.choices[0].message.content);
                } else {
                    hablar("Error en la llave de Groq. La borraré para que la pongas de nuevo.");
                    localStorage.removeItem('groq_key_rogelio');
                }
            } catch (e) { 
                logger("Error de conexión a internet.");
                hablar("No tengo internet para pensar, Rogelio.");
            }
        }

        // --- BOTONES ---
        document.getElementById('sendBtn').onclick = () => {
            const val = document.getElementById('userInput').value;
            if(val) { procesarAccion(val); document.getElementById('userInput').value = ""; }
        };

        document.getElementById('btnConectar').onclick = async () => {
            try {
                recognition.start();
                logger("Buscando OBD2...");
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['00001101-0000-1000-8000-00805f9b34fb'] }],
                    optionalServices: ['00001101-0000-1000-8000-00805f9b34fb']
                });
                const server = await device.gatt.connect();
                document.getElementById('status').innerText = "✅ SCANNER CONECTADO";
                document.getElementById('climaText').innerText = "Motor monitoreado";
                hablar("Sistema listo, Rogelio. Chrysler conectado.");
            } catch (e) { 
                logger("Aviso: Bluetooth no conectado.");
                hablar("Voz activada, pero el scanner no responde. Revisa el puerto OBD2.");
            }
        };
    </script>
</body>
</html>
