<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('userInput');

    function hablar(t) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'es-MX';
        window.speechSynthesis.speak(u);
    }

    async function llamarGemini(texto) {
        let k = localStorage.getItem('gemini_key');
        
        // 1. Verificación de la llave
        if (!k || k === "null") {
            k = prompt("Pega tu API KEY de Google AI Studio (debe empezar con AIza):");
            if (k && k.trim().startsWith("AIza")) { 
                k = k.trim(); 
                localStorage.setItem('gemini_key', k); 
            } else {
                chatBox.innerHTML += `<div><strong>SISTEMA:</strong> Llave no válida. Asegúrate de que empiece con AIza.</div>`;
                return;
            }
        }

        const msgDiv = document.createElement('div');
        msgDiv.innerHTML = `<strong>SISTEMA:</strong> Pensando...`;
        chatBox.appendChild(msgDiv);
        
        // URL para Gemini 1.5 Flash
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k}`;

        try {
            const r = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                // CORRECCIÓN: La estructura del JSON debe ser exacta
                body: JSON.stringify({ 
                    contents: [{ 
                        parts: [{ text: "Eres un copiloto mecánico experto. Responde de forma breve y técnica a: " + texto }] 
                    }] 
                })
            });
            
            const d = await r.json();
            
            if (d.error) {
                // Si el error es de autenticación, borramos la llave
                if(d.error.status === "UNAUTHENTICATED") {
                    localStorage.removeItem('gemini_key');
                }
                throw new Error(d.error.message);
            }

            // CORRECCIÓN: Acceso seguro a la respuesta
            if (d.candidates && d.candidates[0].content) {
                const respuesta = d.candidates[0].content.parts[0].text;
                msgDiv.innerHTML = `<strong>COPILOTO:</strong> ${respuesta}`;
                hablar(respuesta);
            } else {
                throw new Error("Respuesta vacía de la API");
            }

        } catch (e) {
            msgDiv.innerHTML = `<strong>SISTEMA:</strong> Error: ${e.message}`;
            console.error("Error completo:", e);
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // ... (tus funciones enviarTexto e iniciarVoz están bien) ...
    function enviarTexto() {
        if (userInput.value.trim()) { 
            chatBox.innerHTML += `<div><strong>ROGELIO:</strong> ${userInput.value}</div>`; 
            llamarGemini(userInput.value); 
            userInput.value = ""; 
        }
    }

    function iniciarVoz() {
        const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Rec) {
            alert("Tu navegador no soporta reconocimiento de voz.");
            return;
        }
        const rec = new Rec();
        rec.lang = 'es-MX';
        rec.onresult = (e) => { 
            const t = e.results[0][0].transcript; 
            chatBox.innerHTML += `<div><strong>ROGELIO:</strong> ${t}</div>`; 
            llamarGemini(t); 
        };
        rec.start();
    }
</script>
