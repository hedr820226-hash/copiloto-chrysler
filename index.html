<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexDash - Gemini Lite</title>
    <style>
        :root { --accent: #3498db; --bg: #0d0d0d; --card: #1a1a1a; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 500px; margin-bottom: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .value { font-size: 2.5em; font-weight: bold; color: var(--accent); }
        #chat-container { width: 100%; max-width: 500px; background: var(--card); border-radius: 15px; border: 1px solid var(--accent); padding: 15px; box-sizing: border-box; }
        #chat-box { height: 200px; overflow-y: auto; font-size: 0.95em; margin-bottom: 15px; color: #eee; text-align: left; background: #000; padding: 15px; border-radius: 10px; }
        .btn-voice { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; font-size: 1.1em; border-radius: 10px; cursor: pointer; }
        .listening { background: #e74c3c !important; }
    </style>
</head>
<body>

    <h1 style="color: var(--accent);">ApexDash 🚗🤖</h1>
    <p style="font-size: 0.8em; color: #888;">Cerebro: Gemini 2.5 Flash Lite</p>

    <div class="grid">
        <div class="card"><small>RPM</small><div class="value">0</div></div>
        <div class="card"><small>KM/H</small><div class="value">0</div></div>
    </div>

    <div id="chat-container">
        <div id="chat-box"><strong>COPILOTO:</strong> Rogelio, listo para el Chrysler. Presiona para hablar.</div>
        <button class="btn-voice" id="btnVoz" onclick="iniciarVoz()">🎤 HABLAR POR VOZ</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');

        function hablar(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'es-MX';
            window.speechSynthesis.speak(u);
        }

        function msg(q, t) {
            chatBox.innerHTML += `<div style="margin-top:10px;"><strong>${q}:</strong> ${t}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function llamarGemini(texto) {
            let k = localStorage.getItem('gemini_key');
            if (!k) {
                k = prompt("Pega tu API KEY de Google (Gemini):");
                if (k) localStorage.setItem('gemini_key', k.trim());
                else return;
            }

            msg("SISTEMA", "Pensando...");
            
            // URL oficial de Google Gemini 2.5 Flash Lite
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-lite:generateContent?key=${k}`;

            try {
                const r = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Eres el copiloto del Chrysler 96 de Rogelio. Sé breve y mecánico. Pregunta: " + texto }] }]
                    })
                });
                
                const d = await r.json();
                const respuesta = d.candidates[0].content.parts[0].text;
                
                chatBox.lastChild.remove();
                msg("COPILOTO", respuesta);
                hablar(respuesta);
            } catch (e) {
                msg("SISTEMA", "Error de llave. Intenta pegarla de nuevo.");
                localStorage.removeItem('gemini_key');
            }
        }

        function iniciarVoz() {
            const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Rec) return alert("Navegador no soportado");
            const rec = new Rec();
            rec.lang = 'es-MX';
            rec.onstart = () => { document.getElementById('btnVoz').classList.add('listening'); };
            rec.onresult = (e) => {
                const t = e.results[0][0].transcript;
                msg("ROGELIO", t);
                llamarGemini(t);
                document.getElementById('btnVoz').classList.remove('listening');
            };
            rec.start();
        }
    </script>
</body>
</html>
